name: foxboxwebpage-automation

on:
  schedule:
    - cron: '0 0 * * *'   # nightly at midnight UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npm test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: reports/html/
          retention-days: 30

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      - name: Notify Slack on success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          channel-id: C0AR7RVS54M
          slack-message: |
            *foxbox.com nightly tests passed* :white_check_mark:
            Run: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          channel-id: C0AR7RVS54M
          slack-message: |
            *foxbox.com nightly tests FAILED* :x:
            Run: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>
            Report artifact: `playwright-report-${{ github.run_number }}`
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
